{% extends "base.html" %}
{% block title %}Password updated — ArcBook{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-body">
    <h1>Password updated</h1>
    <p class="auth-sub">Your password has been changed. You can sign in with your new password.</p>
    <p class="auth-footer"><a href="{% url 'accounts:login' %}">Sign in</a></p>
  </div>
</div>
{% endblock %}
