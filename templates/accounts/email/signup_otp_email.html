<!DOCTYPE html>
<html lang="en">
<body style="margin:0;padding:0;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f5f7;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;background:#ffffff;border-radius:12px;padding:32px;">
          <tr>
            <td>
              <h1 style="margin:0 0 12px;font-size:22px;font-weight:600;color:#1d1d1f;">Verify your email</h1>
              <p style="margin:0 0 20px;font-size:15px;line-height:1.5;color:#515154;">
                Hello{% if user.first_name %} {{ user.first_name }}{% endif %}, use this code to finish creating your {{ site_name }} account.
              </p>
              <p style="margin:0 0 8px;font-size:13px;line-height:1.5;color:#86868b;">Your verification code</p>
              <p style="margin:0 0 24px;font-size:32px;font-weight:700;letter-spacing:0.2em;color:#1d1d1f;">{{ otp_code }}</p>
              <p style="margin:0;font-size:13px;line-height:1.5;color:#86868b;">
                This code expires in {{ expiry_minutes }} minutes. If you did not sign up, you can ignore this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
