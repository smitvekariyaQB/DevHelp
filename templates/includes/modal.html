<div class="app-modal" id="appModal" hidden aria-hidden="true">
  <div class="app-modal-backdrop" data-modal-close></div>
  <div class="app-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="appModalTitle">
    <h3 class="app-modal-title" id="appModalTitle"></h3>
    <p class="app-modal-message" id="appModalMessage"></p>
    <input type="text" class="app-modal-input" id="appModalInput" hidden aria-hidden="true">
    <div class="app-modal-actions" id="appModalActions">
      <button type="button" class="btn btn-modal-cancel" id="appModalCancel">Cancel</button>
      <button type="button" class="btn btn-modal-confirm" id="appModalConfirm">Confirm</button>
    </div>
  </div>
</div>
