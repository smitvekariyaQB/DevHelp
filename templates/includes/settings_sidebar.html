<aside class="settings-sidebar">
  <ul class="settings-nav">
    <li>
      <a href="{% url 'accounts:profile' %}"
         class="settings-nav-item{% if settings_active == 'profile' %} active{% endif %}"
         data-settings-tab="profile-tab">Profile</a>
    </li>
    <li>
      <a href="{% url 'accounts:profile' %}#password"
         class="settings-nav-item{% if settings_active == 'password' %} active{% endif %}"
         data-settings-tab="password-tab">Change password</a>
    </li>
    <li>
      <a href="{% url 'accounts:profile' %}#preferences"
         class="settings-nav-item{% if settings_active == 'preferences' %} active{% endif %}"
         data-settings-tab="preferences-tab">Preferences</a>
    </li>
    <li>
      <a href="{% url 'workspaces:list' %}"
         class="settings-nav-item{% if settings_active == 'workspaces' %} active{% endif %}">Workspaces</a>
    </li>
  </ul>
  <div class="settings-nav-footer">
    <button type="button" class="settings-nav-item settings-nav-signout" id="btnSignOut">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Sign out
    </button>
  </div>
</aside>
