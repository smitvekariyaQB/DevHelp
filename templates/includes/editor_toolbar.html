<div class="editor-toolbar">
  <div class="editor-toolbar-buttons">
    {% if copy_button_id %}
    <button type="button" class="btn btn-default" id="{{ copy_button_id }}" title="Copy to clipboard">Copy</button>
    {% endif %}
    <button type="button" class="btn btn-default" id="btnUndo" title="Undo (Ctrl+Z)" disabled>Undo</button>
    <button type="button" class="btn btn-default" id="btnRedo" title="Redo (Ctrl+Y)" disabled>Redo</button>
  </div>
</div>
