{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ArcBook{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/app.css' %}?v={% now 'U' %}">
  <link rel="stylesheet" id="hljsTheme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  {% block extra_css %}{% endblock %}
  <script>
    try {
      if (localStorage.getItem('appDarkMode') === '1') {
        document.documentElement.classList.add('dark-mode');
        var hljsTheme = document.getElementById('hljsTheme');
        if (hljsTheme) {
          hljsTheme.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
        }
      }
      var sidebarDefault = localStorage.getItem('appSidebarDefaultOpen');
      if (sidebarDefault === '0') {
        document.documentElement.classList.add('sidebar-collapsed');
      } else if (sidebarDefault === '1') {
        document.documentElement.classList.remove('sidebar-collapsed');
      } else if (localStorage.getItem('appSidebarCollapsed') === '1') {
        document.documentElement.classList.add('sidebar-collapsed');
      }
    } catch (_) {}
  </script>
</head>
<body class="{% block body_class %}{% endblock %}">
  {% if messages %}
  <div class="toast-stack">
    {% for message in messages %}
    <div class="toast toast-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}
  {% include "includes/modal.html" %}
  <script src="{% static 'js/modals.js' %}"></script>
  <script src="{% static 'js/preferences.js' %}"></script>
  <script src="{% static 'js/settings-tabs.js' %}"></script>
  <script src="{% static 'js/router.js' %}"></script>
  <script src="{% static 'js/sidebar.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
